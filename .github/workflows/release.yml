name: Release to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: release-pypi
      cancel-in-progress: false
    environment:
      name: pypi
      url: https://pypi.org/p/uvx-gh
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv build
      - run: uv publish --trusted-publishing always
